<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>💧🥬生菜重量計算_水耕_川聖_箱裝</title>
    <meta name="viewport" content="width=device-width, initial-scale=0.8, shrink-to-fit=no">

    <style>
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            padding: 10px;
            background: #E6E6FA;
            margin-bottom: 100px;
            min-width: fit-content;
        }

        h2 { text-align: center; color: #2e7d32; margin-bottom: 15px; }

        #restoreNotice {
            text-align:center;
            color:#d9534f;
            font-weight:bold;
            margin-bottom:10px;
            display:none;
        }

        table {
            background: white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            border-collapse: collapse;
            width: auto; 
            min-width: 100%;
            table-layout: auto; 
        }

        th, td {
            border: 1px solid #ddd;
            padding: 12px 8px;
            text-align: center;
            white-space: nowrap; 
        }

        th { 
            background-color: #eeeeee; 
            font-size: 18px; 
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 80px;
            padding: 10px 2px;
            font-size: 18px; 
            box-sizing: border-box;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }

        .item {
            text-align: left;
            font-size: 19px; 
            font-weight: bold;
            padding-left: 8px;
            white-space: nowrap; 
        }

        .result {
            font-weight: 900;
            font-size: 24px;
            color: #000;
            min-width: 70px;
        }

        .tare-cell {
            font-size: 16px;
            color: #666;
        }

        tr.error td { background-color: #f8d7da !important; }
        tr.done td { background-color: #d4edda !important; }

        .fab {
            position: fixed;
            right: 20px;
            width: 65px;
            height: 65px;
            border-radius: 50%;
            color: white;
            border: none;
            font-size: 28px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }

        #copyBtn { bottom: 100px; background: #28a745; }
        #clearBtn { bottom: 20px; background: #dc3545; }
    </style>
</head>

<body>

<h2>💧🥬生菜重量計算_水耕_川聖_箱裝</h2>

<div id="restoreNotice">⚠️ 尚有上次未清除資料</div>

<table>
    <thead>
        <tr>
            <th>品項</th>
            <th>總重kg</th>
            <th>件數</th>
            <th>綠園板</th>
            <th>苔重</th>
            <th>實秤</th>
        </tr>
    </thead>
    <tbody id="tableBody"></tbody>
</table>

<button id="copyBtn" class="fab" onclick="copyText()">📋</button>
<button id="clearBtn" class="fab" onclick="clearAll()">🗑️</button>

<script>
const STORAGE_KEY = "lettuce_data_v4";
const BOARD_WEIGHT = 8.2; // ✅ 綠園板重量

const items = [
    {name:"本產美生菜", icon:"🥬", tare:1.45},
    {name:"本產蘿美(牛皮紙箱)", icon:"🥬", tare:1.51},
    {name:"本產蘿美(白箱)", icon:"🥬", tare:1.42},
    {name:"進口美生菜", icon:"📦🥬", tare:1.22},
    {name:"進口蘿美(大包)", icon:"📦🥬", tare:1.06},
    {name:"進口蘿美(小包)", icon:"📦🥬", tare:1.51},

    {name:"紅捲生菜(水耕)", icon:"🔴🥬", tare:1.49},
    {name:"綠捲生菜(水耕)", icon:"🟢🥬", tare:1.49},
    {name:"紅火焰生菜(水耕)", icon:"🔴🔥", tare:1.49},
    {name:"綠火焰生菜(水耕)", icon:"🟢🔥", tare:1.49},
    {name:"紅橡木生菜(水耕)", icon:"🔴🌿", tare:1.49},
    {name:"綠橡木生菜(水耕)", icon:"🟢🌿", tare:1.49},
    {name:"奶油波士頓生菜(水耕)", icon:"🧈🥬", tare:1.49},
    {name:"羽衣甘藍(水耕)", icon:"🥬✨", tare:1.49},
    {name:"紅包心生菜(水耕)", icon:"🔴🥬", tare:1.49},
    {name:"紅蘿蔓(水耕)", icon:"🔴🥬", tare:1.49},
    {name:"歐芹(水耕)", icon:"🌿", tare:1.49}
];

const tbody = document.getElementById("tableBody");

items.forEach((item, i) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
        <td class="item">${item.icon} ${item.name}</td>
        <td><input type="number" step="0.01" id="weight${i}"></td>
        <td><input type="number" id="count${i}"></td>
        <td>
            <select id="board${i}">
                <option value="0" selected>0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
            </select>
        </td>
        <td class="tare-cell">${item.tare}</td>
        <td class="result" id="result${i}">0.00</td>
    `;
    tbody.appendChild(tr);
});

document.addEventListener("input", calc);

function calc() {
    items.forEach((item, i) => {
        const weightVal = document.getElementById("weight"+i).value;
        const countVal = document.getElementById("count"+i).value;
        const boardVal = document.getElementById("board"+i).value;

        const resultCell = document.getElementById("result"+i);
        const row = resultCell.closest("tr");

        row.classList.remove("error", "done");

        if (weightVal === "" && countVal === "") {
            resultCell.innerText = "0.00";
            return;
        }

        if (weightVal === "" || countVal === "" || parseFloat(weightVal) <= 0 || parseInt(countVal) <= 0) {
            resultCell.innerText = "⚠️";
            row.classList.add("error");
            return;
        }

        let weight = parseFloat(weightVal);
        let count = parseInt(countVal);
        let board = parseInt(boardVal);
        let tare = item.tare;

        let netWeight = weight - (tare * count) - (BOARD_WEIGHT * board);

        if (netWeight >= 0) {
            resultCell.innerText = netWeight.toFixed(2);
            row.classList.add("done");
        } else {
            resultCell.innerText = "⚠️";
            row.classList.add("error");
        }
    });

    saveData();
}

function saveData() {
    let data = items.map((_, i) => ({
        weight: document.getElementById("weight"+i).value,
        count: document.getElementById("count"+i).value,
        board: document.getElementById("board"+i).value
    }));
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function loadData() {
    let saved = localStorage.getItem(STORAGE_KEY);
    if (!saved) return;

    let data = JSON.parse(saved);
    let hasData = false;

    data.forEach((d, i) => {
        if (!d) return;

        if (d.weight || d.count) {
            hasData = true;
        }

        document.getElementById("weight"+i).value = d.weight || "";
        document.getElementById("count"+i).value = d.count || "";
        document.getElementById("board"+i).value = d.board || "0";
    });

    if (hasData) {
        document.getElementById("restoreNotice").style.display = "block";
    }

    calc();
}

function copyText() {
    let output = "【生菜重量回報】\n";
    output += "------------------------\n";
    let hasData = false;

    items.forEach((item, i) => {
        const weightVal = document.getElementById("weight"+i).value;
        const countVal = document.getElementById("count"+i).value;

        if (weightVal !== "" && countVal !== "" && parseInt(countVal) > 0) {
            let weight = parseFloat(weightVal);
            let count = parseInt(countVal);
            let board = parseInt(document.getElementById("board"+i).value);
            let tare = item.tare;

            let totalTare = (tare * count).toFixed(2);
            let boardWeight = (BOARD_WEIGHT * board).toFixed(2);
            let result = (weight - totalTare - boardWeight).toFixed(2);

            output += `${item.name}：${count}件\n`;
            output += `計算：${weight} - (${tare}×${count}) - (${BOARD_WEIGHT}×${board}) = ${result}kg\n`;
            output += `實秤：${result}kg\n\n`;
            hasData = true;
        }
    });

    if (!hasData) return alert("請輸入完整資料");

    navigator.clipboard.writeText(output).then(() => {
        alert("已複製完整回報文字！");
    });
}

function clearAll() {
    if (!confirm("確定要全部清除嗎？")) return;

    items.forEach((_, i) => {
        document.getElementById("weight"+i).value = "";
        document.getElementById("count"+i).value = "";
        document.getElementById("board"+i).value = "0";
        document.getElementById("result"+i).innerText = "0.00";
        document.getElementById("result"+i).closest("tr").classList.remove("error","done");
    });

    localStorage.removeItem(STORAGE_KEY);
    document.getElementById("restoreNotice").style.display = "none";
}

loadData();
</script>

</body>
</html>
